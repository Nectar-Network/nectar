# Railway service config for the Nectar keeper.
# Deploy from this directory with `railway up` or via the Railway dashboard
# (point it at this repo, root directory: keeper/, builder: Dockerfile).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./keeper"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/healthz"
healthcheckTimeout = 30

# Environment variables — set these in the Railway dashboard, NOT here.
# Addresses below are the Tranche 1 hardened deployment (2026-05-24, current).
# Required:
#   KEEPER_SECRET   (mark as secret) — operator's Stellar S... key
#   KEEPER_NAME     keeper-alpha (or keeper-beta / keeper-gamma per instance)
#   REGISTRY_CONTRACT  CDT257SL2IYDZJIDXEVKI67MYLCKE73JY6WGUTGZOEFXJHG26FJHJDRB
#   VAULT_CONTRACT     CDZR6VDCPQFOFFKKZ2KMVB67Z54LI5OY73NHBFVI6DR6RE6TL7NN7345
#   USDC_CONTRACT      CD34YC6FFI2KIE2U4ZPCGQIRPH7UPG5YY2QBYNP25ATSFOQSG73J4VBW
#   BLEND_POOL         CCEBVDYM32YNYCVNRXQKDFFPISJJCV557CDZEIRBEE4NCV4KHPQ44HGF
#   SOROBAN_RPC        https://soroban-testnet.stellar.org:443
#   HORIZON_URL        https://horizon-testnet.stellar.org
#   POLL_INTERVAL      10
